<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程表 - 计算机专业</title>
  <link rel="stylesheet" href="styles/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 背景装饰 -->
  <div class="background-decoration">
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>
  </div>

  <div class="schedule-container">
    <!-- 左侧侧边栏 -->
    <aside class="sidebar">
      <!-- Logo和标题 -->
      <div class="sidebar-header">
        <div class="logo-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
          </svg>
        </div>
        <h1 class="sidebar-title">课程表</h1>
        <p class="sidebar-subtitle">Computer Major</p>
      </div>

      <!-- 今日课程 -->
      <div class="today-section">
        <div class="section-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span>今日课程</span>
        </div>
        <div class="today-courses">
          <div class="course-tag math">
            <span>离散数学</span>
            <span class="time">09:00</span>
          </div>
          <div class="course-tag physics">
            <span>马克思原理</span>
            <span class="time">10:30</span>
          </div>
          <div class="course-tag english">
            <span>线性代数</span>
            <span class="time">14:00</span>
          </div>
        </div>
      </div>

      <!-- 课程统计 -->
      <div class="stats-section">
        <div class="stat-item">
          <span class="stat-value">12</span>
          <span class="stat-label">本周课程</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">5</span>
          <span class="stat-label">不同科目</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">3</span>
          <span class="stat-label">实验课程</span>
        </div>
      </div>

      <!-- 科目分类 -->
      <div class="subjects-section">
        <div class="section-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 13V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v7m16 0v5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-5m16 0h-2.586a1 1 0 0 0-.707.293l-2.414 2.414a1 1 0 0 1-.707.293h-3.172a1 1 0 0 1-.707-.293l-2.414-2.414A1 1 0 0 0 6.586 13H4"/>
          </svg>
          <span>科目分类</span>
        </div>
        <div class="subjects-list">
          <div class="subject-item">
            <div class="subject-dot math"></div>
            <span>数学类</span>
            <span class="count">3门</span>
          </div>
          <div class="subject-item">
            <div class="subject-dot physics"></div>
            <span>物理类</span>
            <span class="count">2门</span>
          </div>
          <div class="subject-item">
            <div class="subject-dot english"></div>
            <span>语言类</span>
            <span class="count">2门</span>
          </div>
          <div class="subject-item">
            <div class="subject-dot programming"></div>
            <span>编程类</span>
            <span class="count">2门</span>
          </div>
          <div class="subject-item">
            <div class="subject-dot politics"></div>
            <span>思政类</span>
            <span class="count">2门</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- 右侧课程表主体 -->
    <main class="schedule-main">
      <div class="schedule-card">
        <div class="card-header">
          <h2 class="card-title">计算机专业课程表</h2>
          <div class="week-nav">
            <button class="nav-btn" id="prevWeek">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 19l-7-7 7-7"/>
              </svg>
            </button>
            <span class="week-label">第 8 周</span>
            <button class="nav-btn" id="nextWeek">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 5l7 7-7 7"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="schedule-grid">
          <!-- 时间列 -->
          <div class="time-column">
            <div class="time-cell header">时间段</div>
            <div class="time-cell">上午</div>
            <div class="time-cell">第一节课</div>
            <div class="time-cell">第二节课</div>
            <div class="time-cell">下午</div>
            <div class="time-cell">第三节课</div>
          </div>

          <!-- 星期一 -->
          <div class="day-column">
            <div class="day-header">星期一</div>
            <div class="course-cell merged">上午</div>
            <div class="course-cell math">离散数学</div>
            <div class="course-cell politics">马克思原理</div>
            <div class="course-cell merged">下午</div>
            <div class="course-cell math">线性代数</div>
          </div>

          <!-- 星期二 -->
          <div class="day-column">
            <div class="day-header">星期二</div>
            <div class="course-cell merged">上午</div>
            <div class="course-cell physics">大学物理</div>
            <div class="course-cell math">高数</div>
            <div class="course-cell merged">下午</div>
            <div class="course-cell physics">大学物理</div>
          </div>

          <!-- 星期三 -->
          <div class="day-column">
            <div class="day-header">星期三</div>
            <div class="course-cell merged">上午</div>
            <div class="course-cell math">高数</div>
            <div class="course-cell programming">计算机基础</div>
            <div class="course-cell merged">下午</div>
            <div class="course-cell physics">电子电路</div>
          </div>

          <!-- 星期四 -->
          <div class="day-column">
            <div class="day-header">星期四</div>
            <div class="course-cell merged">上午</div>
            <div class="course-cell english">大学英语</div>
            <div class="course-cell math">高数</div>
            <div class="course-cell merged">下午</div>
            <div class="course-cell politics">马克思原理</div>
          </div>

          <!-- 星期五 -->
          <div class="day-column">
            <div class="day-header">星期五</div>
            <div class="course-cell merged">上午</div>
            <div class="course-cell programming">Web编程艺术</div>
            <div class="course-cell physics">物理实验</div>
            <div class="course-cell merged">下午</div>
            <div class="course-cell other">心理学</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
